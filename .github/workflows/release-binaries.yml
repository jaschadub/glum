name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.1)'
        required: true

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Shell completions and the man page are pure text output from clap —
  # identical regardless of target triple — so we generate them once on a
  # native Linux runner and fan them out to every platform tarball. This
  # avoids having to execute a cross-compiled aarch64 binary to produce
  # them on the x86_64 builder.
  assets:
    name: Generate completions + man page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-latest-assets-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build glum (native)
        run: cargo build --release

      - name: Generate shell completions and man page
        shell: bash
        run: |
          mkdir -p extras
          ./target/release/glum --generate-completions bash > extras/glum.bash
          ./target/release/glum --generate-completions zsh  > extras/_glum
          ./target/release/glum --generate-completions fish > extras/glum.fish
          ./target/release/glum --generate-man              > extras/glum.1

      - name: Upload extras
        uses: actions/upload-artifact@v4
        with:
          name: extras
          path: extras

  build:
    name: Build ${{ matrix.target }}
    needs: assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            # Thin LTO + more codegen units reduces peak memory under cross.
            export CARGO_PROFILE_RELEASE_LTO=thin
            export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=4
            cross build --release --target ${{ matrix.target }} -j2
          else
            cargo build --release --target ${{ matrix.target }} -j2
          fi

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download extras (completions + man page)
        uses: actions/download-artifact@v4
        with:
          name: extras
          path: extras

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="glum-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/glum staging/
          cp LICENSE NOTICE README.md CHANGELOG.md staging/
          # Completion scripts and man page, laid out in the conventional
          # paths so a package manager can rsync `staging/` straight into
          # `/usr/local/` (or a prefix dir) without renames.
          mkdir -p staging/share/bash-completion/completions \
                   staging/share/zsh/site-functions \
                   staging/share/fish/vendor_completions.d \
                   staging/share/man/man1
          cp extras/glum.bash staging/share/bash-completion/completions/glum
          cp extras/_glum     staging/share/zsh/site-functions/_glum
          cp extras/glum.fish staging/share/fish/vendor_completions.d/glum.fish
          cp extras/glum.1    staging/share/man/man1/glum.1
          cd staging
          tar czf "../${ARCHIVE}" *
          cd ..
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="glum-${VERSION}-${{ matrix.target }}.zip"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/glum.exe staging/
          cp LICENSE NOTICE README.md CHANGELOG.md staging/
          # On Windows we just ship a completions/ folder next to the exe —
          # PowerShell and cmd don't have the XDG-style conventions of Unix.
          mkdir -p staging/completions
          cp extras/glum.bash staging/completions/glum.bash
          cp extras/_glum     staging/completions/_glum
          cp extras/glum.fish staging/completions/glum.fish
          cd staging
          7z a "../${ARCHIVE}" *
          cd ..
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  checksums:
    name: Sign and publish release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.4.0
        with:
          cosign-release: 'v2.2.3'

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Sign artifacts with cosign (keyless, Sigstore)
        run: |
          cd artifacts
          for file in *.tar.gz *.zip; do
            [ -f "$file" ] || continue
            echo "Signing $file..."
            cosign sign-blob --yes "$file" \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem"
          done
          # Sign the checksums file too so users can verify the manifest itself.
          cosign sign-blob --yes checksums.txt \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*
          body: |
            ## Pre-built binaries

            Download the archive for your platform from the assets below, or
            use the one-liner installer:

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/jaschadub/glum/main/scripts/install.sh | bash
            ```

            **From crates.io (always available):**
            ```bash
            cargo install glum
            ```

            ### Verification

            Every archive is signed with [Sigstore cosign](https://docs.sigstore.dev/)
            via GitHub Actions OIDC (keyless). Verify with:

            ```bash
            cosign verify-blob \
              --certificate glum-*.pem \
              --signature glum-*.sig \
              --certificate-identity-regexp="https://github.com/jaschadub/glum" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              glum-*.tar.gz
            ```

            SHA-256 checksums are in `checksums.txt` (also cosign-signed).
          append_body: true
